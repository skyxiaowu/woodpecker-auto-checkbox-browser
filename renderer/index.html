<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>啄木鸟自动勾选浏览器</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- 标签栏 -->
    <div class="tab-bar">
      <div id="tabs" class="tabs"></div>
      <button id="btn-new-tab" class="tab-add" title="新建标签">+</button>
      <div class="tab-bar-width-wrap">
        <button id="btn-page-width" class="tab-width-btn" type="button" title="调节页面宽度与缩放">宽度</button>
        <div id="page-width-panel" class="page-width-panel is-hidden">
          <div id="page-width-value" class="page-width-value">1280px · 100%</div>
          <div class="width-slider-wrap">
            <div id="ruler-ticks" class="width-ticks"></div>
            <div id="width-crosshair" class="width-crosshair"></div>
            <input id="page-width-slider" class="width-slider" type="range"
              min="800" max="3840" step="50" value="1280">
          </div>
        </div>
      </div>
    </div>

    <!-- 地址栏（与一般浏览器位置相同） -->
    <div class="nav-bar">
      <button id="btn-back" class="nav-btn" title="后退">←</button>
      <button id="btn-forward" class="nav-btn" title="前进">→</button>
      <button id="btn-reload" class="nav-btn" title="刷新">↻</button>
      <input id="url-input" class="url-input" type="text" placeholder="输入网址后按回车，例如 https://example.com" spellcheck="false">
      <button id="btn-bookmark" class="nav-btn bookmark-btn" title="收藏当前网页">☆</button>
      <button id="btn-go" class="nav-btn go-btn">前往</button>
    </div>

    <!-- 收藏网址栏 -->
    <div id="bookmark-bar" class="bookmark-bar"></div>

    <!-- 自动勾选工具栏 -->
    <div class="tool-bar">
      <span class="tool-label">自动勾选工具</span>
      <button id="btn-start" class="tool-btn start-btn">开始自动勾选</button>
      <button id="btn-stop" class="tool-btn stop-btn" disabled>停止</button>
      <div id="status-text" class="status-text">状态：请先打开网页并登录，再点击「开始自动勾选」</div>
    </div>

  <!-- 日志 -->
    <div id="log-panel" class="log-panel"></div>

    <!-- 网页区域 -->
    <div id="webview-container" class="webview-container"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
